<!DOCTYPE html>
<html lang="en">

<head>
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    (function () {
      emailjs.init("mDG1HNIAVI3xy50CM");
    })();
  </script>
  <title>Step School Hub Okara - Contact</title>
  <link rel="icon" href="/favicon.svg">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <meta name="msapplication-TileColor" content="#da532c" />
  <meta name="theme-color" content="#ffffff" />

  <script>
    (function (html) {
      html.className = html.className.replace(/\bno-js\b/, "js");
    })(document.documentElement);
  </script>
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />



  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Contact - School Resources Hub</title>
</head>

<body>
  <nav>
    <a href="index.html" class="logo">
      <div style="
            width: 2.5rem;
            height: 2.5rem;
            background: #2563eb;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
          ">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width: 1.5rem; height: 1.5rem">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3L2 9l10 6 10-6-10-6zM2 9v6l10 6 10-6V9"></path>
        </svg>
      </div>
      Step School Hub
    </a>
    <div class="hamburger">☰</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="contact-container">
    <div class="contact-card">
      <h1>Contact Us</h1>
      <p>Have questions or suggestions? We'd love to hear from you!</p>

      <form id="contact-form" class="contact-form" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <div class="contact-info">
        <div class="contact-method">
          <h3>Email</h3>
          <p>
            <a href="mailto:mustafa20122022@gmail.com">mustafa20122022@gmail.com</a><br />
            <a href="mailto:splytplayz@gmail.com">splytplayz@gmail.com</a>
          </p>
        </div>


        <div class="contact-method">
          <h3>Social Media</h3>
          <p>
            <a href="https://discord.gg/JvxNFbSB" target="_blank">Discord</a><br />
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const hamburger = document.querySelector(".hamburger");
    const navLinks = document.querySelector(".nav-links");

    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });

    // Form submission handler
    document
      .getElementById("contact-form")
      .addEventListener("submit", function (event) {
        event.preventDefault(); // Prevent default form submission
        emailjs.sendForm("service_di5bge3", "template_ql35l0n", this).then(
          function (response) {
            console.log("Email sent!", response.status, response.text);
            alert("Email sent successfully!");
          },
          function (error) {
            console.error("Error sending email:", error);
            alert("Oops! Something went wrong.");
          }
        );
      });

    // Fix for 405 error
    emailjs.init("mDG1HNIAVI3xy50CM");
  </script>
</body>

</html>
